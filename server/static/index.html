<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdWatch - Login</title>
    <link rel="stylesheet" href="/birdwatch/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 7h.01"/>
                    <path d="M3.4 18H12a8 8 0 0 0 8-8V7a4 4 0 0 0-7.28-2.3L2 20"/>
                    <path d="m20 7 2 .5-2 .5"/>
                    <path d="M10 18v3"/>
                    <path d="M14 17.75V21"/>
                    <path d="M7 18a6 6 0 0 0 3.84-10.61"/>
                </svg>
            </div>
            <h1>BirdWatch</h1>
            <p class="subtitle">Smart Birdhouse Live Stream</p>

            <div id="error-message" class="error-message" style="display: none;"></div>

            <a href="/birdwatch/auth/login" class="google-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                </svg>
                Sign in with Google
            </a>

            <p class="info">Access is restricted to authorized users only.</p>
        </div>
    </div>

    <script>
        // Check for error in URL
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        if (error) {
            const errorDiv = document.getElementById('error-message');
            const messages = {
                'invalid_state': 'Security check failed. Please try again.',
                'no_code': 'Authentication failed. No authorization code received.',
                'exchange_failed': 'Failed to complete authentication. Please try again.',
                'userinfo_failed': 'Failed to retrieve user information.',
                'read_failed': 'Failed to read user data.',
                'parse_failed': 'Failed to process user information.',
                'unauthorized': 'Your email is not authorized to access this application.',
                'session_failed': 'Failed to create session. Please try again.'
            };
            errorDiv.textContent = messages[error] || 'An error occurred. Please try again.';
            errorDiv.style.display = 'block';
        }
    </script>
</body>
</html>
