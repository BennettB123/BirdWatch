<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdWatch - Sightings</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/birdwatch/static/favicons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/birdwatch/static/favicons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/birdwatch/static/favicons/favicon-16x16.png">
    <link rel="manifest" href="/birdwatch/static/favicons/site.webmanifest">
    <link rel="stylesheet" href="/birdwatch/static/css/style.css">
    <link rel="stylesheet" href="/birdwatch/static/css/sightings.css">
</head>
<body>
    <div class="sightings-container">
        <header class="player-header">
            <div class="header-left">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 7h.01"/>
                    <path d="M3.4 18H12a8 8 0 0 0 8-8V7a4 4 0 0 0-7.28-2.3L2 20"/>
                    <path d="m20 7 2 .5-2 .5"/>
                    <path d="M10 18v3"/>
                    <path d="M14 17.75V21"/>
                    <path d="M7 18a6 6 0 0 0 3.84-10.61"/>
                </svg>
                <h1>BirdWatch</h1>
            </div>
            <div class="header-right">
                <a href="/birdwatch/player" class="nav-link">Live Stream</a>
                <span id="user-info" class="user-info"></span>
                <a href="/birdwatch/auth/logout" class="logout-btn">Logout</a>
            </div>
        </header>

        <main class="sightings-main">
            <div class="sightings-header-bar">
                <div>
                    <h2 class="sightings-title">Sightings</h2>
                    <p class="sightings-count" id="sightings-count"></p>
                </div>
            </div>

            <div id="sightings-grid" class="sightings-grid">
                <div class="loading">Loading sightings...</div>
            </div>

            <button id="load-more" class="load-more" style="display: none;">Load More</button>
        </main>

        <footer class="player-footer">
            <p>Bird Watching Sightings Gallery</p>
        </footer>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close" onclick="closeLightbox()">&times;</button>
            <img id="lightbox-image" class="lightbox-image" src="" alt="Sighting">
            <div class="lightbox-info" id="lightbox-info"></div>
        </div>
    </div>

    <script src="/birdwatch/static/js/heartbeat.js"></script>
    <script src="/birdwatch/static/js/sightings.js"></script>
</body>
</html>
