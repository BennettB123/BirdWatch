<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdWatch - Live Stream</title>
    <link rel="stylesheet" href="/birdwatch/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>
</head>
<body>
    <div class="player-container">
        <header class="player-header">
            <div class="header-left">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 7h.01"/>
                    <path d="M3.4 18H12a8 8 0 0 0 8-8V7a4 4 0 0 0-7.28-2.3L2 20"/>
                    <path d="m20 7 2 .5-2 .5"/>
                    <path d="M10 18v3"/>
                    <path d="M14 17.75V21"/>
                    <path d="M7 18a6 6 0 0 0 3.84-10.61"/>
                </svg>
                <h1>BirdWatch</h1>
            </div>
            <div class="header-right">
                <span id="user-info" class="user-info"></span>
                <a href="/birdwatch/auth/logout" class="logout-btn">Logout</a>
            </div>
        </header>

        <main class="player-main">
            <div class="video-wrapper" id="video-wrapper">
                <video id="video" autoplay muted playsinline></video>

                <div id="status-overlay" class="status-overlay">
                    <div class="status-content">
                        <div class="spinner"></div>
                        <p id="status-message">Connecting to stream...</p>
                    </div>
                </div>

                <div class="player-controls" id="player-controls">
                    <div class="progress-container" id="progress-container">
                        <div class="progress-bar" id="progress-bar">
                            <div class="progress-buffered" id="progress-buffered"></div>
                            <div class="progress-played" id="progress-played"></div>
                            <div class="progress-handle" id="progress-handle"></div>
                        </div>
                        <div class="progress-tooltip" id="progress-tooltip">0:00</div>
                    </div>
                    <div class="controls-bar">
                        <div class="controls-left">
                            <button class="control-btn" id="play-pause-btn" aria-label="Play/Pause">
                                <svg class="icon-play" viewBox="0 0 20 20"><path d="M5 3.804v12.392a.5.5 0 0 0 .771.42l9.992-6.196a.5.5 0 0 0 0-.84L5.771 3.384a.5.5 0 0 0-.771.42z"/></svg>
                                <svg class="icon-pause" viewBox="0 0 20 20"><path d="M4 3h4v14H4V3zm8 0h4v14h-4V3z"/></svg>
                            </button>
                            <div class="volume-control" id="volume-control">
                                <button class="control-btn" id="mute-btn" aria-label="Mute/Unmute">
                                    <svg class="icon-volume-high" viewBox="0 0 20 20"><path d="M9.146 3.346a.5.5 0 0 1 .854.353v12.602a.5.5 0 0 1-.854.353L5.293 13H2.5a.5.5 0 0 1-.5-.5v-5a.5.5 0 0 1 .5-.5h2.793l3.853-3.654zM13 7a4 4 0 0 1 0 6m2-8a7 7 0 0 1 0 10"/></svg>
                                    <svg class="icon-volume-low" viewBox="0 0 20 20"><path d="M9.146 3.346a.5.5 0 0 1 .854.353v12.602a.5.5 0 0 1-.854.353L5.293 13H2.5a.5.5 0 0 1-.5-.5v-5a.5.5 0 0 1 .5-.5h2.793l3.853-3.654zM13 7a4 4 0 0 1 0 6"/></svg>
                                    <svg class="icon-muted" viewBox="0 0 20 20"><path d="M9.146 3.346a.5.5 0 0 1 .854.353v12.602a.5.5 0 0 1-.854.353L5.293 13H2.5a.5.5 0 0 1-.5-.5v-5a.5.5 0 0 1 .5-.5h2.793l3.853-3.654zM14.854 7.146a.5.5 0 0 1 0 .708L13.707 9l1.147 1.146a.5.5 0 0 1-.708.708L13 9.707l-1.146 1.147a.5.5 0 0 1-.708-.708L12.293 9l-1.147-1.146a.5.5 0 0 1 .708-.708L13 8.293l1.146-1.147a.5.5 0 0 1 .708 0z"/></svg>
                                </button>
                                <div class="volume-slider-container">
                                    <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01" value="1">
                                </div>
                            </div>
                            <div class="live-indicator" id="live-indicator">
                                <button class="live-btn" id="live-btn">
                                    <span class="live-dot"></span>
                                    <span class="live-text">LIVE</span>
                                </button>
                                <span class="time-behind" id="time-behind"></span>
                            </div>
                        </div>
                        <div class="controls-right">
                            <button class="control-btn" id="fullscreen-btn" aria-label="Fullscreen">
                                <svg class="icon-fullscreen" viewBox="0 0 20 20"><path d="M3 3h5v2H5v3H3V3zm9 0h5v5h-2V5h-3V3zM5 12v3h3v2H3v-5h2zm12 3v-3h2v5h-5v-2h3z"/></svg>
                                <svg class="icon-exit-fullscreen" viewBox="0 0 20 20"><path d="M8 3v5H3V6h3V3h2zm4 0h2v3h3v2h-5V3zM3 12h5v5H6v-3H3v-2zm9 5v-5h5v2h-3v3h-2z"/></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="stream-info">
                <div id="stream-status" class="stream-status">
                    <span class="status-indicator offline"></span>
                    <span id="status-text">Offline</span>
                </div>
                <div id="quality-info" class="quality-info"></div>
            </div>
        </main>

        <footer class="player-footer">
            <p>Smart Birdhouse Live Stream</p>
        </footer>
    </div>

    <script src="/birdwatch/static/js/app.js"></script>
</body>
</html>
