<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BirdWatch - Live Stream</title>
    <link rel="stylesheet" href="/birdwatch/static/css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4/dist/controls.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Icons+Round">
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4/dist/shaka-player.compiled.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/shaka-player@4/dist/shaka-player.ui.js"></script>
</head>
<body>
    <div class="player-container">
        <header class="player-header">
            <div class="header-left">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M16 7h.01"/>
                    <path d="M3.4 18H12a8 8 0 0 0 8-8V7a4 4 0 0 0-7.28-2.3L2 20"/>
                    <path d="m20 7 2 .5-2 .5"/>
                    <path d="M10 18v3"/>
                    <path d="M14 17.75V21"/>
                    <path d="M7 18a6 6 0 0 0 3.84-10.61"/>
                </svg>
                <h1>BirdWatch</h1>
            </div>
            <div class="header-right">
                <span id="user-info" class="user-info"></span>
                <a href="/birdwatch/auth/logout" class="logout-btn">Logout</a>
            </div>
        </header>

        <main class="player-main">
            <div id="video-container" data-shaka-player-container>
                <video id="video" data-shaka-player autoplay muted playsinline></video>
                <div id="stream-waiting" class="stream-waiting">
                    <div class="waiting-content">
                        <div class="spinner"></div>
                        <p>Waiting for stream to start...</p>
                    </div>
                </div>
            </div>
        </main>

        <footer class="player-footer">
            <p>Smart Birdhouse Live Stream</p>
        </footer>
    </div>

    <script src="/birdwatch/static/js/app.js"></script>
</body>
</html>
